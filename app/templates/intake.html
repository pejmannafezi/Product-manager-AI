{% extends "base.html" %}
{% block content %}
<h1>{{ t('nav.intake') }}
  {% if ai_on %}<span class="badge ai">{{ t('ai.enhanced') }}</span>{% endif %}</h1>
<p class="muted">{{ t('intake.hint') }}</p>

<div class="card">
  <form class="stack" action="/api/intake" method="post" enctype="multipart/form-data">
    <label>{{ t('label.title') }}<input type="text" name="name" required placeholder="e.g. PreOp Missing-Information Reduction"></label>
    <label>{{ t('label.description') }}<textarea name="description"
      placeholder="What problem does this solve, for whom, with what AI capability?"></textarea></label>
    <label>{{ t('label.objective') }}<input type="text" name="objective"
      placeholder="e.g. Reduce missing preoperative patient information from 18% to below 5%."></label>
    <label>{{ t('label.phase') }}
      <select name="phase">
        {% for ph in ['discovery','validation','design','development','testing','pilot','production'] %}
        <option value="{{ ph }}">{{ ph }}</option>
        {% endfor %}
      </select></label>
    <label>{{ t('label.requirements') }}<textarea name="requirements"
      placeholder="Key requirements, constraints, must-haves (e.g. human-in-the-loop, HIPAA)."></textarea></label>
    <label>{{ t('label.stakeholders') }}<textarea name="stakeholders"
      placeholder="Owners, approvers, users, reviewers."></textarea></label>
    <label>{{ t('label.deliverables') }}<textarea name="deliverables"
      placeholder="One deliverable per line — the engine schedules their dates."></textarea></label>
    <label>{{ t('label.owner') }}<input type="text" name="owner"></label>
    <label>{{ t('label.customer') }}<input type="text" name="customer"></label>
    <div class="grid cols-2">
      <label>{{ t('label.start_date') }}<input type="date" name="start_date"></label>
      <label>{{ t('label.target_date') }}<input type="date" name="target_date"></label>
    </div>
    <label>{{ t('label.document') }}<input type="file" name="file" accept=".docx,.pdf,.txt,.md"></label>
    <button type="submit">{{ t('btn.submit') }}</button>
  </form>
</div>
{% endblock %}
